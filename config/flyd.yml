shared: &shared
  data_directory: <%= ENV.fetch("FLYD_DIR", File.join(Dir.home, ".flyd")) %>
  raw_directory: <%= File.join(ENV.fetch("FLYD_DIR", File.join(Dir.home, ".flyd")), "raw") %>
  llm_provider: <%= ENV.fetch("FLYD_LLM_PROVIDER", "openai") %>
  default_model: <%= ENV.fetch("FLYD_DEFAULT_MODEL", "gpt-4o-mini") %>
  extraction_model: <%= ENV.fetch("FLYD_EXTRACTION_MODEL", "gpt-4o-mini") %>
  qmd_sidecar_url: <%= ENV.fetch("QMD_SIDECAR_URL", "http://localhost:9393") %>
  backup_directory: <%= ENV.fetch("FLYD_BACKUP_DIR", File.join(Dir.home, ".flyd", "backups")) %>
  backup_passphrase: <%= ENV["FLYD_BACKUP_PASSPHRASE"] %>
  generated_surface_enabled: <%= ActiveModel::Type::Boolean.new.cast(ENV.fetch("FLYD_GENERATED_SURFACE", "false")) %>
  web_discovery_enabled: <%= ActiveModel::Type::Boolean.new.cast(ENV.fetch("FLYD_WEB_DISCOVERY", "true")) %>

development:
  <<: *shared
  generated_surface_enabled: <%= ActiveModel::Type::Boolean.new.cast(ENV.fetch("FLYD_GENERATED_SURFACE", "true")) %>

test:
  <<: *shared
  generated_surface_enabled: true

production:
  <<: *shared
