:scheduler:
  :schedule:
    intelligence_refresh:
      cron: "*/5 * * * *"
      class: ScheduleIntelligenceRefreshJob
      queue: default
      description: "Refresh provider evidence and prepare the next Flyd surface"
    attachment_cleanup:
      cron: "17 2 * * *"
      class: PurgeExpiredIntentAttachmentsJob
      queue: default
      description: "Remove expired intent media that is not retained as scene provenance"
    belief_synthesis:
      cron: "0 * * * *"
      class: BeliefSynthesisJob
      queue: default
      description: "Synthesize beliefs from recent decisions"
    capture_watcher:
      cron: "*/5 * * * *"
      class: CaptureWatcherJob
      queue: default
      description: "Import new auto-capture files"
    backup:
      cron: "0 3 * * *"
      class: BackupJob
      queue: default
      description: "Encrypted database backup"
